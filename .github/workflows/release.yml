name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci && npm run release

      - name: Prepare assets
        env:
          TAG: ${{ steps.tag.outputs.value }}
          REPO: ${{ github.repository }}
        run: |
          cd build && zip -r ../warhammer-lib.zip * && cd ..
          jq --arg dl "https://github.com/${REPO}/releases/download/${TAG}/warhammer-lib.zip" \
             --arg mf "https://github.com/${REPO}/releases/latest/download/module.json" \
             '.download = $dl | .manifest = $mf' \
             module.json > module.json.tmp && mv module.json.tmp module.json

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          gh release delete "${TAG}" --yes 2>/dev/null || true
          gh release create "${TAG}" --title "${TAG}" --generate-notes \
            ./warhammer-lib.zip ./module.json
